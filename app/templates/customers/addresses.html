{% extends "base.html" %}
{% block content %}
<div class="container py-4"><div class="row"><div class="col-md-3">{% include "customers/_sidebar.html" %}</div>
<div class="col-md-9"><div class="d-flex justify-content-between"><h1 class="h3">Addresses</h1><a href="{{ url_for('customers.add_address') }}" class="btn btn-primary btn-sm">Add Address</a></div>
{% for addr in addresses %}<div class="card mb-2"><div class="card-body"><strong>{{ addr.label }}</strong>{% if addr.is_default %}<span class="badge bg-primary ms-2">Default</span>{% endif %}<pre class="mb-0 mt-2 bg-light p-2 rounded">{{ addr.formatted() }}</pre></div></div>{% else %}<p class="text-muted">No addresses saved.</p>{% endfor %}
</div></div></div>
{% endblock %}
