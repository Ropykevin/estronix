{% extends "admin/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<h1 class="h3 mb-4">{{ title }}</h1>
<form method="POST" class="col-md-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3"><label class="form-label">Name</label><input name="name" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Code</label><input name="code" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Region</label><input name="region" class="form-control" placeholder="Nairobi, Mombasa..."></div>
    <div class="mb-3"><label class="form-label">Address</label><textarea name="address" class="form-control"></textarea></div>
    <div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="is_active" id="active" checked><label class="form-check-label" for="active">Active</label></div>
    <button class="btn btn-primary">Save</button>
</form>
{% endblock %}
