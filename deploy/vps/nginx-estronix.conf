# Replace YOUR_DOMAIN with your real domain before enabling this site.
# Install: sudo cp deploy/vps/nginx-estronix.conf /etc/nginx/sites-available/estronix
# Enable:  sudo ln -sf /etc/nginx/sites-available/estronix /etc/nginx/sites-enabled/

upstream estronix_app {
    server unix:/home/estronix/ecommerce/estronix.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    client_max_body_size 64M;

    location /static/ {
        alias /home/estronix/ecommerce/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        include proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_pass http://estronix_app;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}
